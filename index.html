<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">SPACE <span class="explorer">EXPLORER</span></div>
      <ul class="links">
        <li><a href="#"></a>Stars</li>
        <li><a href="#"></a>Planets</li>
        <li><a href="#"></a>Nebula</li>
        <li><a href="#"></a>Black Holes</li>
        <li><a href="#"></a>Asteroids</li>
        <li><a href="#"></a>Milky Way</li>
      </ul>
    </nav>
    <div class="hero">
      <video autoplay loop muted playsinline class="hero-vid">
        <source src="static/hero.mp4" type="video/mp4" />
      </video>
      <div class="hero-text">
        <h1 class="hero-head">
          <span class="space-exploration"
            ><space class="space">Space</space> Exploration</span
          >
          Is
          <span class="one-click">One Click</span>
          Away.
        </h1>
        <p class="paragraph">
          Discover galaxies, black holes, and cosmic wonders through simple,
          interactive pages designed to make space exploration accessible and
          exciting.
        </p>
        <button class="milky-way-button">Visit The Milky-Way</button>
      </div>
    </div>
  </body>
</html>
